name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Android SDK licenses and install platform 34
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "platform-tools" > /dev/null 2>&1

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Install Gradle 8.4
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          python3 -c "import zipfile; zipfile.ZipFile('/tmp/gradle.zip').extractall('/opt')"
          echo "/opt/gradle-8.4/bin" >> $GITHUB_PATH

      - name: Build debug APK
        run: gradle :app:assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/build.log; exit ${PIPESTATUS[0]}
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log
          retention-days: 1

      - name: Verify and upload APK
        run: |
          APK="app/build/outputs/apk/debug/app-debug.apk"
          ls -lh "$APK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CallTranslator-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
